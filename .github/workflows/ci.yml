name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Format, lint, types, tests, and builds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository verification
        run: npm run verify

  browser:
    name: Browser journeys
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chrome and browser dependencies
        run: npx playwright install --with-deps chrome

      - name: Run desktop and mobile browser journeys
        run: npm run test:e2e

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
